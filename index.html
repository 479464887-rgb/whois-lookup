<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="description" content="WHOIS Lookup - 域名WHOIS信息查询"><meta property="og:title" content="WHOIS Lookup"><title>WHOIS Lookup</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}header h1{font-size:20px;color:#58a6ff}.lang-switch{display:flex;gap:4px}.lang-switch button{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px}.lang-switch button.active{background:#1f6feb;border-color:#1f6feb;color:#fff}.container{max-width:900px;margin:0 auto;padding:24px}.search-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}.search-row input{flex:1;min-width:200px;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;padding:10px 16px;border-radius:8px;font-size:14px}.search-row input:focus{outline:none;border-color:#58a6ff}.btn{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500}.btn:hover{background:#30363d}.btn-primary{background:#238636;border-color:#238636;color:#fff}.btn-primary:hover{background:#2ea043}.examples{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}.examples button{background:#21262d;color:#8b949e;border:1px solid #30363d;padding:4px 12px;border-radius:16px;cursor:pointer;font-size:12px}.examples button:hover{color:#58a6ff}.results{background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden}.result-item{display:flex;padding:10px 16px;border-bottom:1px solid #30363d;font-size:13px;line-height:1.6}.result-item:last-child{border-bottom:none}.result-key{color:#58a6ff;min-width:140px;font-weight:500;flex-shrink:0}.result-value{color:#c9d1d9;word-break:break-all}.loading{padding:24px;text-align:center;color:#8b949e}.error{padding:16px;color:#f85149;font-size:13px}.raw-whois{background:#0d1117;padding:16px;font-family:monospace;font-size:12px;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto;color:#8b949e;margin-top:16px;border:1px solid #30363d;border-radius:8px}.toggle-raw{cursor:pointer;color:#58a6ff;font-size:13px;margin-top:8px;display:inline-block}</style></head><body><header><h1>🔍 WHOIS Lookup</h1><div class="lang-switch"><button class="active" onclick="setLang('zh')">中文</button><button onclick="setLang('en')">EN</button></div></header><div class="container"><div class="search-row"><input type="text" id="domain" placeholder="输入域名, e.g. github.com" onkeydown="if(event.key==='Enter')lookup()"><button class="btn btn-primary" onclick="lookup()">🔍 查询</button></div><div class="examples"><button onclick="quickLookup('github.com')">github.com</button><button onclick="quickLookup('google.com')">google.com</button><button onclick="quickLookup('example.com')">example.com</button><button onclick="quickLookup('cloudflare.com')">cloudflare.com</button></div><div id="results"><div style="padding:32px;text-align:center;color:#8b949e">输入域名开始查询 / Enter a domain to search</div></div></div><script>let lang='zh';function setLang(l){lang=l;document.querySelectorAll('.lang-switch button').forEach((b,i)=>b.classList.toggle('active',(i===0&&l==='zh')||(i===1&&l==='en')))}function quickLookup(d){document.getElementById('domain').value=d;lookup()}async function lookup(){const domain=document.getElementById('domain').value.trim();if(!domain){alert('请输入域名');return}document.getElementById('results').innerHTML='<div class="loading">⏳ 查询中... (可能需要几秒)</div>';try{const resp=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent('https://www.whois.com/whois/'+domain));if(!resp.ok)throw new Error('HTTP '+resp.status);const html=await resp.text();const parser=new DOMParser();const doc=parser.parseFromString(html,'text/html');const rawBlock=doc.querySelector('.df-raw');let raw='';let fields=[];if(rawBlock){raw=rawBlock.textContent.trim();fields=parseWhois(raw)}else{const whoisData=doc.querySelector('.whois-data,.df-block');raw=whoisData?whoisData.textContent.trim():html;fields=parseWhois(raw)}const keyLabels={domain:'域名','domain name':'域名',registrar:'注册商','creation date':'创建时间','registry expiry date':'过期时间','updated date':'更新时间','name server':'DNS服务器','name servers':'DNS服务器',status:'状态','dnssec':'DNSSEC','whois server':'WHOIS服务器',registrant:'注册人','admin':'管理员','tech':'技术联系人'};let resultHTML='<div class="results">';if(fields.length===0)resultHTML+='<div class="error">WHOIS数据解析失败，显示原始数据</div>';else fields.forEach(([k,v])=>{const label=keyLabels[k.toLowerCase()]||k;resultHTML+='<div class="result-item"><span class="result-key">'+label+'</span><span class="result-value">'+v+'</span></div>'});resultHTML+='</div>';if(raw){const rawId='raw'+Date.now();resultHTML+='<span class="toggle-raw" onclick="document.getElementById(\''+rawId+'\').style.display=document.getElementById(\''+rawId+'\').style.display===\'none\'?\'block\':\'none\'">📄 显示/隐藏原始WHOIS数据</span><div class="raw-whois" id="'+rawId+'" style="display:none">'+raw.replace(/</g,'&lt;').replace(/>/g,'&gt;')+'</div>'}document.getElementById('results').innerHTML=resultHTML}catch(e){document.getElementById('results').innerHTML='<div class="error">查询失败: '+e.message+'</div>'}}function parseWhois(raw){const lines=raw.split('\n');const fields=[];for(const line of lines){const ci=line.indexOf(':');if(ci>0){const k=line.substring(0,ci).trim();const v=line.substring(ci+1).trim();if(k&&v&&k.length<50)fields.push([k,v])}}return fields}</script></body></html>
